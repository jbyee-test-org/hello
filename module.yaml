# hello 모듈 — **논리만** (origin-free, 규칙 4). 좌표(registry·host·…)는 values-<env> 에.
metadata:
  name: hello
spec:
  product: attest               # platform.yaml products[attest].namespace 로 배치
  chart:
    version: "0.4.0"            # bee-module pin (G6)
  image:
    name: hello                 # repo = <values registry>/hello
  dependsOn: []
  uses:                           # 리소스 = 논리 참조(G37) → platform `resources` 프로파일을 chart 가 룩업·렌더.
    compute: small                #   → container.resources(요청/제한). 구체값은 platform/values(규칙 3·4).
    storage: { profile: persistent, mount: /data }   # → PVC + mount(/data 는 app 지식). class·size 는 platform.
  routing:
    - { path: /hello/v1, port: 8080, rateLimit: { minute: 60 } }   # rateLimit → KongPlugin 파생
  events:
    publishes:                  # 발행자가 스트림 소유(POC B안) → chart 가 NACK Stream 파생
      - { stream: HELLO, subject: hello.events }
  db:
    name: attest-db             # (kind,name) 공유 그룹(B안) — 같은 name = 한 인스턴스
    schema: attest              # 이 모듈이 소유(migrations 가 생성) — grant 불변식의 owner 마커(G18①)
    migrations: db/migration    # V<weight>.<seq>__*.sql — 모듈별 Flyway Job(G14③)

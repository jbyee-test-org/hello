# 얇은 caller (G5) — 로직은 전부 core-infra 의 재사용 워크플로에.
name: publish-dev
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  publish:
    permissions:
      contents: read
      packages: write
    uses: jbyee-test-org/bee-core-infra/.github/workflows/module-publish.yaml@main
    with: { module: hello }
    secrets:
      SNAPSHOT_KEY: ${{ secrets.SNAPSHOT_DEPLOY_KEY }}
